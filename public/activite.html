<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GestionComV2 | Activite</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="activity" data-role="admin">
    <div class="app-shell">
      <div id="sidebar-container"></div>

      <div class="content-shell">
        <header class="page-header compact">
          <div>
            <p class="eyebrow">Suivi</p>
            <h2>Activite et caisse</h2>
            <p class="page-copy">
              Historique recent des operations et derniers mouvements de caisse.
            </p>
          </div>
          <div class="hero-card">
            <p>Etat de la base</p>
            <strong id="db-status">Chargement...</strong>
            <small id="db-meta">Initialisation.</small>
          </div>
        </header>

        <main class="page-grid two-columns">
          <section class="panel list-panel">
            <div class="panel-head">
              <h3>Journal d'activite</h3>
            </div>
            <div id="activity-list" class="list"></div>
          </section>

          <section class="panel list-panel">
            <div class="panel-head">
              <h3>Derniers mouvements de caisse</h3>
            </div>
            <div id="cash-list" class="list"></div>
          </section>
        </main>
      </div>
    </div>

    <template id="list-item-template">
      <article class="list-item">
        <div>
          <h3></h3>
          <p></p>
        </div>
        <strong></strong>
      </article>
    </template>

    <script src="/components.js"></script>
    <script src="/app.js"></script>
    <script>
      loadComponent("/components/sidebar.html", "#sidebar-container")
        .then(() => activateSidebarLink());
    </script>
  </body>
</html>
