<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GestionComV2 | Approvisionnement</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="stock" data-role="admin">
    <div class="app-shell">
      <div id="sidebar-container"></div>

      <div class="content-shell">
        <header class="page-header compact">
          <div>
            <p class="eyebrow">Flux stock</p>
            <h2>Approvisionnement</h2>
            <p class="page-copy">
              Saisie des entrees en stock et consultation des derniers mouvements.
            </p>
          </div>
          <div class="hero-card">
            <p>Etat de la base</p>
            <strong id="db-status">Chargement...</strong>
            <small id="db-meta">Initialisation.</small>
          </div>
        </header>

        <main class="page-grid two-columns">
          <section class="panel">
            <div class="panel-head">
              <h3>Nouvel approvisionnement</h3>
            </div>
            <form id="stock-form" class="form-grid">
              <label>
                Produit
                <select id="stock-product-id" name="productId" required></select>
              </label>
              <label>
                Quantite recue
                <input type="number" name="quantity" min="1" step="1" value="1" />
              </label>
              <label>
                Cout unitaire
                <input type="number" name="unitCost" min="0" step="0.01" value="0" />
              </label>
              <label>
                Fournisseur / note
                <input type="text" name="note" placeholder="Achat grossiste" />
              </label>
              <button type="submit">Enregistrer l'entree</button>
            </form>
          </section>

          <section class="panel list-panel">
            <div class="panel-head">
              <h3>Derniers mouvements</h3>
            </div>
            <div id="stock-movements-list" class="list"></div>
          </section>
        </main>
      </div>
    </div>

    <template id="list-item-template">
      <article class="list-item">
        <div>
          <h3></h3>
          <p></p>
        </div>
        <strong></strong>
      </article>
    </template>

    <script src="/components.js"></script>
    <script src="/app.js"></script>
    <script>
      loadComponent("/components/sidebar.html", "#sidebar-container")
        .then(() => activateSidebarLink());
    </script>
  </body>
  </html>
