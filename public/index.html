<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GestionComV2 | Tableau de bord</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="dashboard" data-role="admin">
    <div class="app-shell">
      <div id="sidebar-container"></div>

      <div class="content-shell">
        <header class="page-header">
          <div>
            <p class="eyebrow">Vue generale</p>
            <h2>Tableau de bord</h2>
            <p class="page-copy">
              Vue rapide sur l'etat du stock, des services, de la caisse et des
              derniers mouvements.
            </p>
          </div>
          <div class="hero-card">
            <p>Etat de la base</p>
            <strong id="db-status">Chargement...</strong>
            <small id="db-meta">Initialisation.</small>
          </div>
        </header>

        <section class="stats-grid" id="stats-grid"></section>

        <main class="dashboard-grid">
          <section class="panel list-panel">
            <div class="panel-head">
              <h3>Produits sous seuil</h3>
            </div>
            <div id="low-stock-list" class="list"></div>
          </section>

          <section class="panel list-panel">
            <div class="panel-head">
              <h3>Dernieres ventes</h3>
            </div>
            <div id="sales-list" class="list"></div>
          </section>

          <section class="panel list-panel">
            <div class="panel-head">
              <h3>Journal recent</h3>
            </div>
            <div id="activity-list" class="list"></div>
          </section>

          <section class="panel list-panel">
            <div class="panel-head">
              <h3>Derniers mouvements de stock</h3>
            </div>
            <div id="stock-movements-list" class="list"></div>
          </section>
        </main>
      </div>
    </div>

    <template id="list-item-template">
      <article class="list-item">
        <div>
          <h3></h3>
          <p></p>
        </div>
        <strong></strong>
      </article>
    </template>

    <template id="stat-card-template">
      <article class="stat-card">
        <span></span>
        <strong></strong>
        <small></small>
      </article>
    </template>

    <script src="/components.js"></script>
    <script src="/app.js"></script>
    <script>
      loadComponent("/components/sidebar.html", "#sidebar-container")
        .then(() => activateSidebarLink());
    </script>
  </body>
</html>
