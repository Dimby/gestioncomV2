<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GestionComV2 | Services</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="services" data-role="admin">
    <div class="app-shell">
      <div id="sidebar-container"></div>

      <div class="content-shell">
        <header class="page-header compact">
          <div>
            <p class="eyebrow">Prestations</p>
            <h2>Services</h2>
            <p class="page-copy">
              Catalogue des prestations proposees par le multiservice.
            </p>
          </div>
          <div class="hero-card">
            <p>Etat de la base</p>
            <strong id="db-status">Chargement...</strong>
            <small id="db-meta">Initialisation.</small>
          </div>
        </header>

        <main class="page-grid two-columns">
          <section class="panel">
            <div class="panel-head">
              <h3>Nouveau service</h3>
              <span id="services-count">0 service</span>
            </div>
            <form id="service-form" class="form-grid">
              <label>
                Nom
                <input type="text" name="name" placeholder="Photocopie A4 N&B" required />
              </label>
              <div class="service-products-field">
                <span>Produits utilises</span>
                <div class="service-products-controls">
                  <select id="service-product-id"></select>
                  <input
                    id="service-product-quantity"
                    type="number"
                    min="0.01"
                    step="0.01"
                    value="1"
                    aria-label="Quantite utilisee"
                  />
                  <button type="button" class="secondary-button" data-action="add-service-product">
                    Ajouter
                  </button>
                </div>
                <input type="hidden" name="usedProducts" id="service-used-products" value="[]" />
                <div id="service-products-list" class="selected-products-list"></div>
              </div>
              <label>
                Tarif de base ou prix de vente
                <input type="number" name="basePrice" min="0" step="0.01" value="0" />
              </label>
              <label>
                Information
                <textarea name="info" placeholder="Details utiles pour ce service"></textarea>
              </label>
              <button type="submit">Ajouter le service</button>
            </form>
          </section>

          <section class="panel list-panel">
            <div class="panel-head">
              <h3>Liste des services</h3>
            </div>
            <div id="services-list" class="list"></div>
          </section>
        </main>
      </div>
    </div>

    <template id="list-item-template">
      <article class="list-item">
        <div>
          <h3></h3>
          <p></p>
        </div>
        <strong></strong>
      </article>
    </template>

    <script src="/components.js"></script>
    <script src="/app.js"></script>
    <script>
      loadComponent("/components/sidebar.html", "#sidebar-container")
        .then(() => activateSidebarLink());
    </script>
  </body>
  </html>
